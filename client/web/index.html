<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local LLM Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Microsoft YaHei', sans-serif;
  background: #1a1a2e; color: #e0e0e0;
  height: 100vh; display: flex; flex-direction: column;
}
header {
  background: #16213e; padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid #0f3460;
}
header h1 { font-size: 18px; color: #e94560; }
.status { font-size: 12px; padding: 4px 12px; border-radius: 12px; }
.status.ok { background: #1b4332; color: #52b788; }
.status.err { background: #3d0000; color: #ff6b6b; }

.chat-container {
  flex: 1; overflow-y: auto; padding: 16px 24px;
  display: flex; flex-direction: column; gap: 16px;
}
.message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; }
.message.user { align-self: flex-end; background: #e94560; color: #fff; border-bottom-right-radius: 4px; }
.message.assistant { align-self: flex-start; background: #16213e; border: 1px solid #0f3460; border-bottom-left-radius: 4px; }
.message.system { align-self: center; font-size: 12px; color: #888; background: none; }

.input-area {
  background: #16213e; padding: 16px 24px; border-top: 1px solid #0f3460;
  display: flex; gap: 12px; align-items: center;
}
.input-area textarea {
  flex: 1; background: #1a1a2e; color: #e0e0e0; border: 1px solid #0f3460;
  border-radius: 8px; padding: 10px 14px; font-size: 14px; resize: none;
  font-family: inherit; height: 44px; max-height: 120px;
}
.input-area textarea:focus { outline: none; border-color: #e94560; }
.input-area button {
  background: #e94560; color: #fff; border: none; border-radius: 8px;
  padding: 10px 24px; cursor: pointer; font-size: 14px; white-space: nowrap;
  transition: background 0.2s;
}
.input-area button:hover { background: #ff6b7d; }
.input-area button:disabled { background: #555; cursor: not-allowed; }

.spinner { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: #e94560; animation: pulse 1s infinite; margin-right: 8px; }
@keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

.model-tag { font-size: 11px; color: #888; margin-top: 4px; }
</style>
</head>
<body>

<header>
  <h1>本地 LLM 实时对话</h1>
  <span class="status" id="status">检查中...</span>
</header>

<div class="chat-container" id="chat"></div>

<div class="input-area">
  <textarea id="input" placeholder="输入消息..." rows="1"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
  <button id="sendBtn" onclick="sendMessage()">发送</button>
  <button onclick="resetSession()" style="background:#555;padding:10px 16px;">重置</button>
</div>

<script>
const API = 'http://localhost:18080';
let sessionId = 'web_' + Date.now();

async function checkHealth() {
  const statusEl = document.getElementById('status');
  try {
    const resp = await fetch(`${API}/v1/health`);
    const data = await resp.json();
    if (data.current_model_available) {
      statusEl.className = 'status ok';
      statusEl.textContent = `${data.current_model} 就绪`;
      return true;
    } else {
      statusEl.className = 'status err';
      statusEl.textContent = '模型未下载';
      return false;
    }
  } catch(e) {
    statusEl.className = 'status err';
    statusEl.textContent = '服务离线';
    return false;
  }
}

function addMessage(role, content) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.textContent = content;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function sendMessage() {
  const input = document.getElementById('input');
  const btn = document.getElementById('sendBtn');
  const message = input.value.trim();
  if (!message) return;

  input.value = '';
  btn.disabled = true;

  addMessage('user', message);

  // 创建assistant消息（会动态更新）
  const assistantDiv = addMessage('assistant', '');
  const spinner = document.createElement('span');
  spinner.className = 'spinner';
  assistantDiv.appendChild(spinner);
  let fullText = '';

  try {
    const resp = await fetch(`${API}/v1/chat/session/stream?session_id=${sessionId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'user', content: message }],
        temperature: 0.7,
        max_tokens: 2048,
      }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop(); // 保留未完成的行

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = JSON.parse(line.slice(6));
          if (data.error) {
            fullText = '错误: ' + data.error;
            break;
          }
          if (data.done) break;
          fullText += data.content || '';
          assistantDiv.textContent = fullText;
        }
      }
    }

    // 移除spinner
    if (spinner.parentNode) spinner.remove();
    assistantDiv.textContent = fullText || '(空回复)';

  } catch(e) {
    if (spinner.parentNode) spinner.remove();
    assistantDiv.textContent = '错误: ' + e.message;
  }

  btn.disabled = false;
  input.focus();
}

async function resetSession() {
  try {
    await fetch(`${API}/v1/chat/reset?session_id=${sessionId}`, { method: 'POST' });
    addMessage('system', '对话已重置');
  } catch(e) {
    addMessage('system', '重置失败: ' + e.message);
  }
}

// 初始化
checkHealth();
setInterval(checkHealth, 10000);
</script>
</body>
</html>
